name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Format check
        run: yarn format:check

      - name: Tests
        run: yarn test

      - name: Build
        run: yarn build

      - name: Verify dist size
        run: |
          SIZE=$(wc -c < dist/wateringhub-card.js)
          echo "Bundle size: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: Bundle too small, something went wrong"
            exit 1
          fi
